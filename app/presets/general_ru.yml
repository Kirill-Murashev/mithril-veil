id: general_ru
name: General RU
description: Conservative general-purpose Russian PII detection profile.
enabled_entities:
  - EMAIL
  - PHONE
  - INN
  - SNILS
  - PASSPORT_RU
detectors:
  regex: true
  natasha: false
  gliner: false
gliner:
  labels: []
  threshold: 0.5
notes:
  - Structured identifiers only; NER disabled by default.
  - Enable --use-ner or --use-gliner explicitly to override.

id: court_case_ru
name: Court Case RU
description: Russian court case materials and procedural text.
enabled_entities:
  - PERSON
  - ORGANIZATION
  - LOCATION
  - ADDRESS
  - EMAIL
  - PHONE
  - INN
  - SNILS
  - PASSPORT_RU
  - COURT_CASE_NUMBER
  - CONTRACT_NUMBER
  - URL
detectors:
  regex: true
  natasha: true
  gliner: false
gliner:
  labels:
    - person
    - organization
    - location
    - court case number
  threshold: 0.5
notes:
  - Natasha NER is probabilistic; review results manually.
  - Court and contract numbers rely on deterministic recognizers.

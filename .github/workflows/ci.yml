# Default CI: lint, compile, and unit tests. Does not install GLiNER or download model weights.
# Python 3.11 is excluded from the matrix because pyproject.toml requires-python >=3.12.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (dev extras only)
        run: pip install -e ".[dev]"

      - name: Ruff check
        run: ruff check app tests

      - name: Ruff format check
        run: ruff format --check app tests

      - name: Compile app
        run: python -m compileall app

      - name: Pytest
        run: pytest -v

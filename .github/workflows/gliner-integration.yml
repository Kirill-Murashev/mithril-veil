# Manual GLiNER integration tests. May download ML model weights from the network.
# Not run on push/PR; default CI deselects integration tests via pytest addopts.

name: GLiNER integration

on:
  workflow_dispatch:

jobs:
  integration:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package (dev + gliner extras)
        run: pip install -e ".[dev,gliner]"

      - name: Pytest integration
        run: pytest -m integration -v
